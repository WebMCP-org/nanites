name: Agent CI

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/agent-ci.yml"
      - "src/**"
      - "tests/**"
      - "public/**"
      - "wrangler.jsonc"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/agent-ci.yml"
      - "src/**"
      - "tests/**"
      - "public/**"
      - "wrangler.jsonc"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-and-test:
    timeout-minutes: 20
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Check Nanites
        run: vp check

      - name: Test Nanites backend
        env:
          CI: "true"
        run: vp test --project backend
