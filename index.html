<!doctype html>
<html lang="en" data-theme="workers">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nanites are small durable agents for GitHub repository maintenance."
    />
    <meta name="application-name" content="Nanites" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="apple-mobile-web-app-title" content="Nanites" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#151e2c" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nanites" />
    <meta
      property="og:description"
      content="Small durable agents for GitHub repository maintenance."
    />
    <meta property="og:image" content="/icons/nanites-icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <title>Nanites</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/icons/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/app.webmanifest" />
    <script>
      (() => {
        const mode = localStorage.getItem("theme");
        const colorScheme = mode === "light" || mode === "dark" ? mode : "light dark";
        const meta = document.querySelector('meta[name="color-scheme"]');

        if (meta) {
          meta.setAttribute("content", colorScheme);
        }

        document.documentElement.style.colorScheme = colorScheme;

        if (mode === "light" || mode === "dark") {
          document.documentElement.setAttribute("data-mode", mode);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client.tsx"></script>
  </body>
</html>
